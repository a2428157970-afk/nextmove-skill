minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend lint
        entry: npm --prefix frontend run lint
        language: system
        pass_filenames: false
        files: ^frontend/

      - id: backend-lint
        name: Backend lint
        entry: python scripts/lint_backend.py
        language: system
        pass_filenames: false
        files: ^backend/
